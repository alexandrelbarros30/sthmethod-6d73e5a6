name: Android Build (APK + AAB)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android app
    runs-on: ubuntu-latest
    env:
      CAP_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build web (Vite)
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: npm run build

      - name: Add Android platform (if missing)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Generate app icons & splash
        run: |
          npm install --no-save --legacy-peer-deps @capacitor/assets@^3
          npx @capacitor/assets generate --android --iconBackgroundColor '#000000' --iconBackgroundColorDark '#000000' --splashBackgroundColor '#000000' --splashBackgroundColorDark '#000000'

      - name: Sync Capacitor
        run: npx cap sync android

      # -------- DEBUG APK (unsigned, para instalar direto no celular) --------
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sthmethod-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # -------- RELEASE AAB assinado (para Play Store) --------
      # Só roda quando os 4 secrets estão configurados no repositório.
      - name: Check release signing secrets
        id: signing
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] \
            && [ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ] \
            && [ -n "${{ secrets.ANDROID_KEY_ALIAS }}" ] \
            && [ -n "${{ secrets.ANDROID_KEY_PASSWORD }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Secrets de assinatura não configurados — pulando build de release. Adicione ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS e ANDROID_KEY_PASSWORD em Settings → Secrets and variables → Actions."
          fi

      - name: Decode keystore
        if: steps.signing.outputs.ready == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore

      - name: Configure release signing
        if: steps.signing.outputs.ready == 'true'
        run: |
          cat >> android/app/build.gradle <<'EOF'

          android {
              signingConfigs {
                  release {
                      storeFile file("release.keystore")
                      storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF

      - name: Build release AAB
        if: steps.signing.outputs.ready == 'true'
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Build release APK
        if: steps.signing.outputs.ready == 'true'
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload release AAB
        if: steps.signing.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sthmethod-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload release APK
        if: steps.signing.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: sthmethod-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Cleanup keystore
        if: always() && steps.signing.outputs.ready == 'true'
        run: rm -f android/app/release.keystore

      # -------- Publicar APK no GitHub Releases (tag "latest") --------
      - name: Rename APKs for release
        run: |
          mkdir -p release-assets
          cp android/app/build/outputs/apk/debug/app-debug.apk release-assets/sthmethod.apk
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk release-assets/sthmethod-signed.apk
          fi

      - name: Publish to "latest" GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: STH METHOD APK (latest)
          body: |
            Build automática do app Android.
            Baixe `sthmethod.apk` e instale no celular (permita "Fontes desconhecidas").
          files: release-assets/*.apk
          make_latest: "true"
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}