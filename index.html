    <script>
      // Pre-boot version check: kills stale service worker / caches before React loads
      (function () {
        try {
          var KEY = "sth-preboot-version";
          var stored = localStorage.getItem(KEY);
          fetch("/version.json?t=" + Date.now(), { cache: "no-store" })
            .then(function (r) { return r.json(); })
            .then(function (data) {
              var remote = data && data.version;
              if (!remote || stored === remote) return;
              localStorage.setItem(KEY, remote);
              var jobs = [];
              if ("serviceWorker" in navigator) {
                jobs.push(navigator.serviceWorker.getRegistrations().then(function (rs) {
                  return Promise.all(rs.map(function (r) { return r.unregister(); }));
                }));
              }
              if ("caches" in window) {
                jobs.push(caches.keys().then(function (ks) {
                  return Promise.all(ks.map(function (k) { return caches.delete(k); }));
                }));
              }
              Promise.all(jobs).finally(function () {
                if (stored && stored !== remote) {
                  var u = new URL(window.location.href);
                  u.searchParams.set("_v", remote);
                  window.location.replace(u.toString());
                }
              });
            })
            .catch(function () {});
        } catch (e) {}
      })();
    </script>
